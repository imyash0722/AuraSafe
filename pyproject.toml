[tool.flet]
org = "com.hackathon.aurasafe"
description = "AuraSafe - Offline-First Humanitarian Safety Platform"
product = "AuraSafe"
company = "Hack for Humanity"
version = "1.0.0"

[tool.flet.android]
# Permissions needed by the app
permissions = [
    "android.permission.CAMERA",
    "android.permission.INTERNET",
    "android.permission.READ_MEDIA_IMAGES",
    "android.permission.READ_EXTERNAL_STORAGE",
    "android.permission.WRITE_EXTERNAL_STORAGE",
]

[tool.flet.python]
# Packages to include in the Android build.
# opencv-python is excluded â€” too large and requires native libs not available on Android.
# pyzbar is excluded â€” requires libzbar.so native lib not available.
# cryptography is excluded â€” heavy native dep; not needed for core features on Android.
# vosk and sounddevice are desktop-only for SehatSathi voice capture and are intentionally excluded here.
packages = [
    "flet-permission-handler",
    "qrcode",
    "Pillow",
    "requests",
]

